<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">2SV Backup Codes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Sign In</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="signup.html">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container center-card">
        <div class="card shadow-lg">
            <div class="card-body bg-light text-dark">
                <h4 class="text-center mb-4">Create an Account</h4>

                <div class="mb-3">
                    <input class="form-control" type="email" placeholder="Email" id="email">
                </div>
                <div class="mb-3">
                    <input class="form-control" type="password" placeholder="Password" id="password">
                </div>
                <div class="mb-3">
                    <input class="form-control" type="password" placeholder="Confirm Password" id="confirmPassword">
                </div>
                <div id="message" class="mb-3 text-center">
                    <label id="message_label"></label>
                </div>
                <div class="d-grid mb-3">
                    <button class="btn btn-primary" onclick="signUp()">Sign Up</button>
                </div>
                <div class="text-center">
                    <small>Already have an account? <a href="index.html">Sign In!</a></small>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="firebase.js"></script>
    <script>
        function signUp() {
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();
            let confirmPassword = document.getElementById("confirmPassword").value.trim();

            if (!email || !password || !confirmPassword) {
                document.getElementById("message").style.display = "block";
                document.getElementById("message_label").innerText = "Please fill in all fields.";
                return;
            }

            if (password != confirmPassword) {
                document.getElementById("message").style.display = "block";
                document.getElementById("message_label").innerText = "Passwords do not match.";
                return;
            }

            let safeEmail = convertToFirebaseAcceptableData(email);
            let safePassword = convertToFirebaseAcceptableData(password);

            firebase.database().ref(`/${safeEmail}/password`).once("value", (snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById("message").style.display = "block";
                    document.getElementById("message_label").innerText = "Account already exists. Please sign in.";
                } else {
                    setFirebaseData(`/${safeEmail}`, "password", safePassword);
                    setFirebaseData(`/${safeEmail}`, "codes/0", "control");
                    alert("Account created successfully! Redirecting to Sign In...");
                    window.location.href = "index.html";
                }
            });
        }
    </script>
</body>

</html>
